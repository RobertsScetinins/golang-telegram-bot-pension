services:
  telegram-bot:
    container_name: telegram_bot
    build: .
    restart: always
    env_file:
      - .env
    # labels:
    #   - "com.centurylinklabs.watchtower.enable=true"
    stop_grace_period: 30s
    depends_on:
      - postgresql
    healthcheck:
      test: ["CMD", "pgrep", "bot"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network

  postgresql:
    image: postgres:16
    container_name: telegram_bot_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: 
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  db-import:
    image: postgres:16
    container_name: telegram_db_import
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/data_dump.sql:/data_dump.sql
    networks:
      - bot_network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Importing data_dump.sql from /db directory...' &&
        psql -h postgresql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /data_dump.sql &&
        echo 'Import complete!'
      "

  # watchtower:
  #   image: docker.io/containrrr/watchtower:latest
  #   container_name: bot-watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300 --label-enable --cleanup --rolling-restart
    

networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data: