services:
  telegram-bot:
    image: docker.io/dmitrijsvasilevskis/telegram-bot:latest
    restart: always
    env_file:
      - .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    stop_grace_period: 30s
    depends_on:
      - postgresql
    healthcheck:
      test: ["CMD", "pgrep", "bot"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network

  postgresql:
    image: postgres:16
    container_name: telegram_bot_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: 
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  watchtower:
    image: docker.io/containrrr/watchtower:latest
    container_name: bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable --cleanup --rolling-restart
    
networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data: